<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Honours 2nd Year class routine for the Department of Islamic History and Culture, Ananda Mohan College, Mymensingh" />
  <meta name="theme-color" content="#1a1f36" />
  <title>Class Routine</title>
  <link rel="icon" type="image/png" href="src/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="src/img/icon.png" />
  <link rel="stylesheet" href="src/style.css" />
</head>

<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="header-brand">
        <img src="src/img/logo.png" alt="College Logo" class="header-logo" />
        <div class="header-text-container">
          <h1>Class Routine</h1>
          <p><a href="https://www.anandamohangovtcollege.edu.bd/" target="_blank" rel="noopener noreferrer"
              style="color: inherit; text-decoration: none;">Ananda Mohan College, Mymensingh</a></p>
        </div>
      </div>

      <div class="header-controls" role="toolbar" aria-label="Site controls">

        <button id="theme-toggle" class="btn-toggle" aria-label="Toggle color theme" title="Switch to Night Mode">
          <span id="theme-icon" aria-hidden="true">
            <!-- Filled by JS -->
          </span>
          <span id="theme-btn-label">Night Mode</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="main-content" id="main" role="main">

    <div class="routine-intro">
      <h2 id="routine-title"><a href="https://www.anandamohangovtcollege.edu.bd/" target="_blank"
          rel="noopener noreferrer" style="color: inherit; text-decoration: none;">Ananda Mohan College</a></h2>
      <p id="subheading-text">Department of Islamic History and Culture</p>
    </div>

    <div id="countdown-widget" class="countdown-widget" aria-live="polite"></div>

    <div class="search-container">
      <div class="search-wrapper">
        <div class="custom-select" id="category-custom-select">
          <input type="hidden" id="search-category" value="all">
          <button type="button" class="select-button" id="category-btn" aria-haspopup="listbox" aria-expanded="false">
            <span id="category-label">All</span>
            <span class="chevron-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </span>
          </button>
          <ul class="select-dropdown" role="listbox" id="category-list">
            <li role="option" data-value="all" class="active">All</li>
            <li role="option" data-value="code">Subject Code</li>
            <li role="option" data-value="subject">Subject Name</li>
            <li role="option" data-value="teacher">Teacher Name</li>
          </ul>
        </div>
        <div class="search-input-wrapper">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input type="text" id="class-search" placeholder="Search by teacher, subject, or code..."
            aria-label="Filter classes" autocomplete="off" />
          <button id="search-clear" class="btn-clear" aria-label="Clear search" title="Clear search">
            &times;
          </button>
        </div>
      </div>
    </div>

    <div id="routine-container" aria-live="polite" aria-label="Class routine">
      <!-- Rendered by script.js -->
    </div>

    <!-- No results message -->
    <div id="no-results" class="no-results hidden">
      <div class="no-results-content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
        </svg>
        <p>Search results not found</p>
        <button id="reset-search" class="btn-reset">Show all classes</button>
      </div>
    </div>

  </main>

  <!-- ── Footer ──────────────────────────────────────────── -->
  <footer class="site-footer" role="contentinfo">
    <p class="f-love">
      &copy; <span id="footer-year"></span>
      <a href="https://tanvirr007.github.io/" target="_blank" rel="noopener noreferrer" class="footer-link">TANVIR
        HASAN</a>
    </p>
    <p class="version-info">
      Last updated on <span id="release-date"></span> • Version <span id="version-number"></span>
    </p>
  </footer>

  <!-- Logo Modal -->
  <div id="logo-modal" class="modal" aria-hidden="true" role="dialog" aria-label="Logo preview">
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Close preview">&times;</button>
      <img id="modal-img" src="" alt="Enlarged Logo" />
    </div>
  </div>

  <script src="src/script.js"></script>
</body>

</html>
